version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  web:
    build: .
    container_name: offense_guard_api
    ports:
      - "5000:5000"
    volumes:
      - ./models:/app/models
      - ./overrides.json:/app/overrides.json
    environment:
      - MONGO_URI=mongodb://mongodb:27017/
      - FLASK_ENV=production
    depends_on:
      - mongodb

volumes:
  mongo_data:
